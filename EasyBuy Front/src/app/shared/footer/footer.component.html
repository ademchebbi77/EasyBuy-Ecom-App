<footer class="bg-foreground text-primary-foreground mt-20">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 py-14">
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-10">
      <!-- Brand -->
      <div class="flex flex-col gap-4">
        <a routerLink="/" class="flex items-center gap-2">
          <span class="w-8 h-8 rounded-lg bg-primary flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-primary-foreground">
              <circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/>
            </svg>
          </span>
          <span class="font-display text-xl font-bold text-white">
            Easy<span class="text-primary">ToBuy</span>
          </span>
        </a>
        <p class="text-sm text-white/60 leading-relaxed">
          Your one-stop shop for electronics, fashion, home essentials and much more. Fast delivery, easy returns.
        </p>
        <div class="flex items-center gap-3">
          <a *ngFor="let social of socialLinks" href="#" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center hover:bg-primary transition-colors" aria-label="Social link">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" [innerHTML]="social"></svg>
          </a>
        </div>
      </div>

      <!-- Shop -->
      <div>
        <h4 class="text-white font-semibold mb-4">Shop</h4>
        <ul class="flex flex-col gap-2.5">
          <li *ngFor="let item of shopLinks">
            <a [routerLink]="['/products']" [queryParams]="{search: item}" class="text-sm text-white/60 hover:text-primary transition-colors">
              {{item}}
            </a>
          </li>
        </ul>
      </div>

      <!-- Help -->
      <div>
        <h4 class="text-white font-semibold mb-4">Help</h4>
        <ul class="flex flex-col gap-2.5">
          <li *ngFor="let item of helpLinks">
            <a href="#" class="text-sm text-white/60 hover:text-primary transition-colors">
              {{item}}
            </a>
          </li>
        </ul>
      </div>

      <!-- Newsletter -->
      <div>
        <h4 class="text-white font-semibold mb-4">Stay Updated</h4>
        <p class="text-sm text-white/60 mb-4 leading-relaxed">
          Subscribe for exclusive deals and new product alerts.
        </p>
        <form class="flex gap-2" (submit)="onSubmit($event)">
          <div class="relative flex-1">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="absolute left-3 top-1/2 -translate-y-1/2 text-white/40">
              <rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
            <input type="email" placeholder="Your email" class="w-full pl-9 pr-3 py-2.5 bg-white/10 border border-white/20 rounded-xl text-sm text-white placeholder:text-white/40 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary" />
          </div>
          <button type="submit" class="px-4 py-2.5 bg-primary text-primary-foreground text-sm font-semibold rounded-xl hover:bg-[#0284c7] transition-colors">
            Join
          </button>
        </form>
      </div>
    </div>

    <div class="mt-12 pt-8 border-t border-white/10 flex flex-col sm:flex-row items-center justify-between gap-4">
      <p class="text-xs text-white/40">&copy; {{year}} EasyToBuy. All rights reserved.</p>
      <div class="flex items-center gap-6">
        <a *ngFor="let item of legalLinks" href="#" class="text-xs text-white/40 hover:text-primary transition-colors">
          {{item}}
        </a>
      </div>
    </div>
  </div>
</footer>
