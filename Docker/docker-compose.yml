version: '3.8'

services:

  # ─── EUREKA SERVER (FIRST) ──────────────────────────────
  eureka-server:
    build: ../eurekaserverdemo
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - easybuy-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8761/actuator/health || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 15


  # ─── CONFIG SERVER (SECOND) ─────────────────────────────
  config-server:
    build: ../config-server
    container_name: config-server
    ports:
      - "8888:8888"
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - easybuy-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8888/actuator/health || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 15


  # ─── API GATEWAY (THIRD) ────────────────────────────────
  api-gateway:
    build: ../ApiGatewayDemo
    container_name: api-gateway
    ports:
      - "8087:8087"
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - easybuy-net


  # ─── INFRA ──────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: easybuydemo
    ports:
      - "3306:3306"
    networks:
      - easybuy-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - easybuy-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10


  # ─── MICROSERVICES ──────────────────────────────────────

  user-service:
    build: ../user-service/User
    container_name: user-service
    ports:
      - "8081:8081"
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - easybuy-net


  product-service:
    build: ../product-service
    container_name: product-service
    ports:
      - "8083:8083"
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - easybuy-net


  order-service:
    build: ../order-service/Order
    container_name: order-service
    ports:
      - "8082:8082"
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - easybuy-net


  category-service:
    build: ../category-service
    container_name: category-service
    ports:
      - "8084:8084"
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - easybuy-net


  review-service:
    build: ../review-service
    container_name: review-service
    ports:
      - "8085:8085"
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - easybuy-net


  # ─── PAYMENT (LAST) ─────────────────────────────────────
  payment-service:
    build: ../payment-service
    container_name: payment-service
    ports:
      - "8086:8086"
    depends_on:
      eureka-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - easybuy-net


networks:
  easybuy-net:
    driver: bridge